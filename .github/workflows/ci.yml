name: platform-ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Build web
        run: npm --workspace @agri/web run build
